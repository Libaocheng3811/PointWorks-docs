site_name: PointWorks
site_description: 专业三维点云处理软件
site_author: PointWorks Team
site_url: https://testdemocommunity.github.io/PointWorks-docs/

repo_name: CloudTool2
repo_url: https://github.com/TestDemoCommunity/CloudTool2
edit_uri: https://github.com/TestDemoCommunity/PointWorks-docs/edit/main/docs/

copyright: Copyright &copy; 2024-2026 PointWorks Team

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  favicon: assets/images/favicon.png
  logo: assets/images/logo.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

nav:
  - 首页: index.md
  - 快速开始:
    - getting-started/index.md
    - 简介: getting-started/introduction.md
    - 安装指南: getting-started/installation.md
    - 五分钟上手: getting-started/quick-start.md
  - 功能说明:
    - features/index.md
    - 数据管理:
      - features/data-management/index.md
      - 支持的格式: features/data-management/file-formats.md
      - 导入导出: features/data-management/import-export.md
      - 项目文件: features/data-management/project-files.md
    - 可视化:
      - features/visualization/index.md
      - 视图操作: features/visualization/view-controls.md
      - 颜色模式: features/visualization/color-modes.md
      - 显示设置: features/visualization/display-settings.md
    - 滤波处理:
      - features/filtering/index.md
      - 直通滤波: features/filtering/passthrough.md
      - 体素降采样: features/filtering/voxel-grid.md
      - 统计离群点移除: features/filtering/statistical-outlier.md
      - 半径离群点移除: features/filtering/radius-outlier.md
      - 条件滤波: features/filtering/conditional.md
      - 网格最小值: features/filtering/grid-minimum.md
      - 局部最大值: features/filtering/local-maximum.md
    - 配准:
      - features/registration/index.md
      - 中心对齐: features/registration/align-by-centers.md
      - 全局配准: features/registration/global-registration.md
      - 精配准 (ICP): features/registration/fine-registration.md
      - 点对配准: features/registration/point-pairs.md
    - 分割:
      - features/segmentation/index.md
      - 形状检测: features/segmentation/shape-detection.md
      - 形态学滤波: features/segmentation/morphological.md
      - 区域生长: features/segmentation/region-growing.md
      - 欧式聚类: features/segmentation/clustering.md
      - 超体素: features/segmentation/supervoxel.md
    - 地面分割: features/ground-segmentation/index.md
    - 植被分割: features/vegetation/index.md
    - 变化检测:
      - features/change-detection/index.md
      - 云对云距离: features/change-detection/cloud-to-cloud.md
      - 云对网格距离: features/change-detection/cloud-to-mesh.md
      - 色度条与标量场: features/change-detection/scalar-bar.md
    - 曲面重建与网格:
      - features/surface/index.md
      - 曲面重建: features/surface/reconstruction.md
      - 凸包计算: features/surface/convex-hull.md
      - 边界提取: features/surface/boundary.md
    - 距离计算: features/distance/index.md
    - 编辑工具:
      - features/editing/index.md
      - 颜色设置: features/editing/colors.md
      - 坐标变换: features/editing/transformation.md
      - 法线编辑: features/editing/normals.md
      - 尺度缩放: features/editing/scale.md
      - 包围盒: features/editing/bounding-box.md
    - 测量: features/measure/index.md
    - 深度图: features/range-image/index.md
  - 教程:
    - tutorials/index.md
    - 基础工作流: tutorials/basic-workflow.md
    - 地面滤波实战: tutorials/ground-filtering.md
    - 点云配准实战: tutorials/registration-tutorial.md
    - 变化检测实战: tutorials/change-detect-tutorial.md
    - Python 自动化: tutorials/python-automation.md
  - 进阶:
    - advanced/index.md
    - 大点云处理策略: advanced/large-pointcloud.md
    - 全局坐标偏移: advanced/global-shift.md
    - Python 脚本:
      - advanced/python-scripting/index.md
      - Python 控制台: advanced/python-scripting/console.md
      - Python 编辑器: advanced/python-scripting/editor.md
      - API 参考: advanced/python-scripting/api-reference.md
    - 插件开发: advanced/plugin-development/index.md
  - 开发:
    - development/index.md
    - 编译构建: development/build.md
    - 项目架构: development/architecture.md
    - 添加新算法: development/adding-algorithm.md
    - 添加新文件格式: development/adding-file-format.md
    - 扩展 Python API: development/extending-python.md
    - 常见问题: development/faq.md

plugins:
  - search:
      lang:
        - zh
        - en
  - blog:
      blog_dir: blog
      blog_toc: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - mermaid2
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
