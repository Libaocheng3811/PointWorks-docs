<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#151722" />
            <stop offset="100%" stop-color="#06070B" />
        </linearGradient>

        <linearGradient id="pwGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="60%" stop-color="#007BFF" />
            <stop offset="100%" stop-color="#651FFF" />
        </linearGradient>

        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF9100" />
            <stop offset="100%" stop-color="#FF3D00" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="512" height="512" rx="112" fill="url(#bgGradient)" />

    <g fill="#007BFF" opacity="0.3">
        <circle cx="30" cy="50" r="2"/><circle cx="80" cy="30" r="3"/><circle cx="150" cy="45" r="1.5"/><circle cx="220" cy="25" r="2.5"/><circle cx="300" cy="60" r="2"/><circle cx="380" cy="30" r="1.5"/><circle cx="450" cy="50" r="3"/><circle cx="490" cy="90" r="2"/>
        <circle cx="20" cy="130" r="1.5"/><circle cx="70" cy="100" r="2"/><circle cx="250" cy="90" r="3"/><circle cx="320" cy="120" r="1.5"/><circle cx="410" cy="95" r="2"/><circle cx="480" cy="150" r="2.5"/>
        <circle cx="40" cy="200" r="3"/><circle cx="210" cy="160" r="1.5"/><circle cx="280" cy="180" r="2"/><circle cx="450" cy="210" r="2"/><circle cx="500" cy="260" r="1.5"/>
        <circle cx="30" cy="280" r="2"/><circle cx="90" cy="250" r="1.5"/><circle cx="350" cy="240" r="2.5"/><circle cx="470" cy="300" r="2"/>
        <circle cx="20" cy="360" r="2.5"/><circle cx="60" cy="330" r="1.5"/><circle cx="220" cy="320" r="2"/><circle cx="420" cy="340" r="1.5"/><circle cx="480" cy="380" r="3"/>
        <circle cx="40" cy="440" r="2"/><circle cx="120" cy="410" r="3"/><circle cx="180" cy="460" r="1.5"/><circle cx="260" cy="430" r="2.5"/><circle cx="320" cy="480" r="2"/><circle cx="390" cy="450" r="1.5"/><circle cx="460" cy="470" r="2"/>
    </g>

    <g fill="#00E5FF" opacity="0.6">
        <circle cx="110" cy="60" r="3.5"/><circle cx="180" cy="110" r="2"/><circle cx="270" cy="40" r="4"/><circle cx="360" cy="80" r="2.5"/><circle cx="430" cy="40" r="3"/>
        <circle cx="50" cy="160" r="2.5"/><circle cx="230" cy="130" r="3.5"/><circle cx="380" cy="150" r="2"/><circle cx="460" cy="120" r="3"/>
        <circle cx="20" cy="240" r="3"/><circle cx="310" cy="200" r="4"/><circle cx="420" cy="230" r="2.5"/><circle cx="490" cy="200" r="3"/>
        <circle cx="50" cy="320" r="2"/><circle cx="380" cy="280" r="3.5"/><circle cx="480" cy="340" r="2"/>
        <circle cx="80" cy="380" r="4"/><circle cx="280" cy="360" r="2.5"/><circle cx="450" cy="400" r="3"/>
        <circle cx="30" cy="480" r="3"/><circle cx="150" cy="470" r="2"/><circle cx="220" cy="450" r="4"/><circle cx="350" cy="430" r="2.5"/><circle cx="430" cy="480" r="3.5"/>
    </g>

    <g stroke="url(#pwGradient)" stroke-width="3" stroke-opacity="0.2" fill="none">
        <polygon points="80,280 180,280 250,440" />
        <polygon points="180,280 250,440 330,200" />
        <polygon points="250,440 330,200 400,440" />
        <polygon points="330,200 400,440 460,120" />
        <polygon points="80,80 180,280 330,200" opacity="0.5" />
    </g>

    <g fill="none" stroke="url(#pwGradient)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
        <path d="M 80,440 L 80,80 A 100,100 0 1,1 80,280" />
        
        <path d="M 180,280 L 250,440 L 330,200 L 400,440 L 460,120" />
    </g>

    <g>
        <circle cx="80" cy="440" r="22" fill="url(#pwGradient)" />
        <circle cx="80" cy="80" r="22" fill="url(#pwGradient)" />
        <circle cx="80" cy="280" r="22" fill="url(#pwGradient)" />
        <circle cx="180" cy="180" r="22" fill="url(#pwGradient)" /> 

        <circle cx="180" cy="280" r="22" fill="url(#pwGradient)" />
        <circle cx="250" cy="440" r="22" fill="url(#pwGradient)" />
        
        <circle cx="330" cy="200" r="30" fill="url(#accentGradient)" filter="url(#glow)" /> 
        
        <circle cx="400" cy="440" r="22" fill="url(#pwGradient)" />
        <circle cx="460" cy="120" r="22" fill="url(#pwGradient)" />
    </g>

    <g fill="#FFFFFF" opacity="0.8">
        <circle cx="75" cy="75" r="5" />
        <circle cx="75" cy="275" r="5" />
        <circle cx="75" cy="435" r="5" />
        <circle cx="175" cy="175" r="5" /> <circle cx="175" cy="275" r="5" />
        <circle cx="245" cy="435" r="5" />
        
        <circle cx="325" cy="195" r="8" /> 
        
        <circle cx="395" cy="435" r="5" />
        <circle cx="455" cy="115" r="5" />
    </g>
</svg>
